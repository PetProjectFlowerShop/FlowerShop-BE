version: '3.9'

services:
  postgres-product:
    image: postgres:17-alpine
    container_name: postgres-product
    restart: unless-stopped
    ports:
      - "${PRODUCT_DB_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build: .
    container_name: product-service
    depends_on:
      postgres-product:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres-product:5432/${PRODUCT_DB_NAME}
      PRODUCT_DB_USER: ${PRODUCT_DB_USER}
      PRODUCT_DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
    env_file:
      - .env
    restart: unless-stopped

