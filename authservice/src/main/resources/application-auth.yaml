spring:
  #  profiles:
  #    active: local

  application:
    name: authservice

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/auth}
    username: ${POSTGRES_USER:user}
    password: ${POSTGRES_PASS:pass}
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

google:
  clientId: ${GOOGLE_CLIENT_ID}

app:
  jwt:
    secret: ${JWT_SECRET:fl0ria_is_strong_and_long_secret_key_1234567890}
    expiration-time: ${EXPIRATION_TIME:86400000}

server:
  port: ${AUTH_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health

