spring:
  application:
   name: authservice

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASS}
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time: ${EXPIRATION_TIME}

server:
  port: ${SERVER_PORT}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time: ${EXPIRATION_TIME}
