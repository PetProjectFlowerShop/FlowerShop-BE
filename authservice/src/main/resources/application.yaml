spring:
#  profiles:
#    active: local

  application:
    name: authservice

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASS}
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s

google:
  clientId: ${GOOGLE_CLIENT_ID}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time: ${EXPIRATION_TIME}

server:
  port: ${AUTH_SERVICE_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health

