spring:
#  profiles:
#    active: local

  application:
   name: authservice

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASS}
  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2s

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-time: ${EXPIRATION_TIME}
  password:
    recovery:
      host: ${SERVICE_HOST}
      path: ${PASSWORD_RECOVERY_PATH}

server:
  port: ${SERVER_PORT}

