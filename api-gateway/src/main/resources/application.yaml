spring:
  application:
    name: api-gateway

app:
  jwt:
    secret: ${JWT_SECRET}

server:
  port: ${API_GATEWAY_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health

auth:
  service:
    url: ${AUTH_SERVICE_URL}
product:
  service:
    url: ${PRODUCT_SERVICE_URL}
order:
  service:
    url: ${ORDER_SERVICE_URL}

